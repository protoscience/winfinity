<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockView Pro — Live Market Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- Top Bar -->
  <header id="topbar">
    <div id="topbar-left">
      <span class="logo">&#9650; StockView Pro</span>
    </div>
    <div id="topbar-indices">
      <span class="idx-item" id="idx-spy">SPY —</span>
      <span class="idx-item" id="idx-vix">VIX —</span>
      <span class="idx-item" id="idx-gspc">S&P500 —</span>
      <span class="idx-item" id="idx-ixic">NASDAQ —</span>
      <span class="idx-item" id="idx-dji">DOW —</span>
    </div>
    <div id="topbar-right">
      <span id="last-updated">Updating…</span>
    </div>
  </header>

  <div id="app">
    <!-- Left sidebar: stock list -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Top 20 Stocks</h2>
        <div class="search-wrap">
          <input id="stock-search" type="text" placeholder="Search symbol…" autocomplete="off" />
        </div>
      </div>
      <div id="stock-list"></div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <!-- Chart panel -->
      <section id="chart-section">
        <div id="chart-header">
          <div id="chart-title">
            <span id="selected-symbol">SPY</span>
            <span id="selected-name"></span>
            <span id="selected-price" class="price-badge">—</span>
            <span id="selected-change" class="change-badge">—</span>
          </div>
          <div id="chart-controls">
            <button class="btn-tab active" data-period="1mo">1M</button>
            <button class="btn-tab" data-period="3mo">3M</button>
            <button class="btn-tab" data-period="6mo">6M</button>
            <button class="btn-tab" data-period="1y">1Y</button>
            <div class="separator"></div>
            <label class="toggle-label">
              <input type="checkbox" id="toggle-prediction" checked />
              Prediction
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="toggle-ripster" checked />
              Ripster EMA
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="toggle-bb" />
              Bollinger
            </label>
          </div>
        </div>

        <!-- Main candlestick chart -->
        <div id="main-chart-container"></div>

        <!-- RSI sub-panel -->
        <div class="indicator-panel">
          <div class="ind-label">RSI (14)</div>
          <div id="rsi-chart-container"></div>
        </div>

        <!-- MACD sub-panel -->
        <div class="indicator-panel">
          <div class="ind-label">MACD (12,26,9)</div>
          <div id="macd-chart-container"></div>
        </div>
      </section>

      <!-- Bottom panels -->
      <div id="bottom-panels">
        <!-- SPY + VIX panel -->
        <section id="spy-vix-section" class="bottom-card">
          <div class="card-tabs">
            <button class="card-tab active" data-target="spy-panel">SPY</button>
            <button class="card-tab" data-target="vix-panel">VIX</button>
          </div>
          <div id="spy-panel" class="card-panel active">
            <div id="spy-mini-chart"></div>
          </div>
          <div id="vix-panel" class="card-panel">
            <div id="vix-mini-chart"></div>
          </div>
        </section>

        <!-- Prediction panel -->
        <section id="prediction-section" class="bottom-card">
          <h3>4-Week Prediction</h3>
          <div id="prediction-content">
            <div class="prediction-loading">Select a stock →</div>
          </div>
        </section>

        <!-- Market influences -->
        <section id="influence-section" class="bottom-card">
          <h3>Market Influence</h3>
          <div id="influence-content">
            <div class="tabs">
              <button class="inf-tab active" data-tab="sectors">Sectors</button>
              <button class="inf-tab" data-tab="macro">Macro</button>
              <button class="inf-tab" data-tab="fear">Fear/Greed</button>
            </div>
            <div id="sectors-tab" class="inf-panel active"></div>
            <div id="macro-tab" class="inf-panel" style="display:none"></div>
            <div id="fear-tab" class="inf-panel" style="display:none"></div>
          </div>
        </section>
      </div>

      <!-- News / Catalysts -->
      <section id="news-section">
        <div class="news-tabs">
          <button class="news-tab active" data-target="market-news">Market News</button>
          <button class="news-tab" data-target="stock-news">Stock News</button>
        </div>
        <div id="market-news" class="news-panel active"></div>
        <div id="stock-news" class="news-panel" style="display:none"></div>
      </section>
    </main>
  </div>

  <!-- Stock detail modal -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-inner">
      <button class="modal-close" id="modal-close">&#x2715;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
