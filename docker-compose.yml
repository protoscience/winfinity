version: '3.9'

services:
  stockview:
    build: .
    image: winfinity:latest
    container_name: winfinity
    ports:
      - "8080:5000"
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - FLASK_ENV=production
      - PORT=5000
      - DB_PATH=/app/data/winfinity.db
    volumes:
      - winfinity_data:/app/data
      - winfinity_cache:/root/.cache/py-yfinance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/market-overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  winfinity_data:
  winfinity_cache:
